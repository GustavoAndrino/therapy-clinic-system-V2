services:
  mysql:
    image: mysql:8.4
    container_name: therapy_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: therapy
      MYSQL_USER: therapy_user
      MYSQL_PASSWORD: therapy_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3306:3306"
    volumes:
      - therapy_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  therapy_mysql_data:
